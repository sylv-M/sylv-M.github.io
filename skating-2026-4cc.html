<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Four Continents</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #111;
            padding: 0;
        }
        
        /* 照片网格 - 极简 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            margin: 0;
        }
        
        .photo-item {
            overflow: hidden;
            cursor: pointer;
            background: #000;
            position: relative;
        }
        
        .photo-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            aspect-ratio: 4/3;
            display: block;
            transition: transform 0.4s ease;
        }
        
        .photo-item:hover .photo-image {
            transform: scale(1.05);
            opacity: 0.9;
        }
        
        /* Lightbox - 极简 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-img {
            max-width: 95%;
            max-height: 95vh;
            object-fit: contain;
        }
        
        .lightbox-close {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            background: rgba(0,0,0,0.3);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        
        .lightbox-close:hover {
            opacity: 1;
            background: rgba(0,0,0,0.5);
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.3);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        
        .lightbox-nav:hover {
            opacity: 1;
            background: rgba(0,0,0,0.5);
        }
        
        .lightbox-prev {
            left: 10px;
        }
        
        .lightbox-next {
            right: 10px;
        }
        
        /* 响应式 */
        @media (max-width: 900px) {
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .photo-grid {
                grid-template-columns: 1fr;
            }
            
            .lightbox-nav {
                width: 35px;
                height: 35px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- 照片网格 -->
    <div class="photo-grid">
        <div class="photo-item" onclick="openLightbox(1)">
            <img src="https://via.placeholder.com/400x300/4A90E2/FFFFFF?text=1" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(2)">
            <img src="https://via.placeholder.com/400x300/7ED321/FFFFFF?text=2" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(3)">
            <img src="https://via.placeholder.com/400x300/9013FE/FFFFFF?text=3" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(4)">
            <img src="https://via.placeholder.com/400x300/F5A623/FFFFFF?text=4" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(5)">
            <img src="https://via.placeholder.com/400x300/BD10E0/FFFFFF?text=5" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(6)">
            <img src="https://via.placeholder.com/400x300/417505/FFFFFF?text=6" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(7)">
            <img src="https://via.placeholder.com/400x300/FF6B6B/FFFFFF?text=7" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(8)">
            <img src="https://via.placeholder.com/400x300/4ECDC4/FFFFFF?text=8" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(9)">
            <img src="https://via.placeholder.com/400x300/FFD166/FFFFFF?text=9" class="photo-image">
        </div>
        <div class="photo-item" onclick="openLightbox(10)">
            <img src="https://via.placeholder.com/400x300/118AB2/FFFFFF?text=10" class="photo-image">
        </div>
    </div>
    
    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <button class="lightbox-nav lightbox-prev" onclick="changeImage(-1)">‹</button>
        <div class="lightbox-content">
            <img id="lightbox-img" class="lightbox-img" src="">
        </div>
        <button class="lightbox-nav lightbox-next" onclick="changeImage(1)">›</button>
    </div>
    
    <script>
        let currentImageIndex = 1;
        const totalImages = 10;
        
        function openLightbox(index) {
            currentImageIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const clickedImage = document.querySelector(`.photo-item:nth-child(${index}) .photo-image`);
            
            lightboxImg.src = clickedImage.src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function changeImage(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 1) currentImageIndex = totalImages;
            if (currentImageIndex > totalImages) currentImageIndex = 1;
            openLightbox(currentImageIndex);
        }
        
        // 键盘控制
        document.addEventListener('keydown', function(e) {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') changeImage(-1);
            if (e.key === 'ArrowRight') changeImage(1);
        });
        
        // 点击背景关闭
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
    </script>
</body>
</html>
