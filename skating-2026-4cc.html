<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Four Continents - Figure Skating</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            background: #f8fafc;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 导航 */
        .breadcrumb {
            margin: 20px 0 30px;
            color: #666;
            font-size: 0.9em;
        }
        
        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .breadcrumb a:hover {
            color: #5a6fd8;
            text-decoration: underline;
        }
        
        /* 页面标题 - 简化版 */
        .album-header {
            text-align: center;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .album-header h1 {
            font-size: 1.8em;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .album-header p {
            color: #666;
            font-size: 1em;
        }
        
        /* 照片网格 - 更紧凑 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        
        .photo-item {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #f0f0f0;
            cursor: pointer;
        }
        
        .photo-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        
        .photo-image {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }
        
        .photo-item:hover .photo-image {
            transform: scale(1.03);
        }
        
        /* Lightbox 模态框样式 - 简化 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        
        .lightbox-img {
            max-width: 100%;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
            z-index: 1001;
        }
        
        .lightbox-close:hover {
            background: rgba(255,255,255,0.15);
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            z-index: 1001;
        }
        
        .lightbox-nav:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .lightbox-prev {
            left: 20px;
        }
        
        .lightbox-next {
            right: 20px;
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 10px 25px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .btn-outline {
            border: 1px solid #ddd;
            color: #666;
            background: white;
        }
        
        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f8fafc;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .photo-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 900px) {
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
        
        @media (max-width: 768px) {
            .photo-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .album-header h1 {
                font-size: 1.6em;
            }
            
            .album-header p {
                font-size: 0.9em;
            }
            
            body {
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .photo-grid {
                gap: 12px;
            }
            
            .action-btn {
                padding: 8px 20px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <div class="breadcrumb">
        <a href="index.html">Home</a> &gt;
        <a href="photos.html">Photos</a> &gt;
        <a href="figure-skating.html">Figure Skating</a> &gt;
        <span>2026 Four Continents</span>
    </div>
    
    <!-- 相册标题 -->
    <header class="album-header">
        <h1>2026 Four Continents Championships</h1>
        <p>Beijing, China • January 2026</p>
    </header>
    
    <!-- 照片网格 -->
    <div class="photo-grid">
        <!-- 照片1 -->
        <div class="photo-item" onclick="openLightbox(1)">
            <img src="https://via.placeholder.com/400x300/4A90E2/FFFFFF?text=Photo+1" 
                 alt="Gold Medal Ceremony" 
                 class="photo-image">
        </div>
        
        <!-- 照片2 -->
        <div class="photo-item" onclick="openLightbox(2)">
            <img src="https://via.placeholder.com/400x300/7ED321/FFFFFF?text=Photo+2" 
                 alt="Free Skate Performance" 
                 class="photo-image">
        </div>
        
        <!-- 照片3 -->
        <div class="photo-item" onclick="openLightbox(3)">
            <img src="https://via.placeholder.com/400x300/9013FE/FFFFFF?text=Photo+3" 
                 alt="Morning Practice" 
                 class="photo-image">
        </div>
        
        <!-- 照片4 -->
        <div class="photo-item" onclick="openLightbox(4)">
            <img src="https://via.placeholder.com/400x300/F5A623/FFFFFF?text=Photo+4" 
                 alt="Costume Details" 
                 class="photo-image">
        </div>
        
        <!-- 照片5 -->
        <div class="photo-item" onclick="openLightbox(5)">
            <img src="https://via.placeholder.com/400x300/BD10E0/FFFFFF?text=Photo+5" 
                 alt="Ice Reflection" 
                 class="photo-image">
        </div>
        
        <!-- 照片6 -->
        <div class="photo-item" onclick="openLightbox(6)">
            <img src="https://via.placeholder.com/400x300/417505/FFFFFF?text=Photo+6" 
                 alt="Victory Smile" 
                 class="photo-image">
        </div>
        
        <!-- 照片7 -->
        <div class="photo-item" onclick="openLightbox(7)">
            <img src="https://via.placeholder.com/400x300/FF6B6B/FFFFFF?text=Photo+7" 
                 alt="Jump Sequence" 
                 class="photo-image">
        </div>
        
        <!-- 照片8 -->
        <div class="photo-item" onclick="openLightbox(8)">
            <img src="https://via.placeholder.com/400x300/4ECDC4/FFFFFF?text=Photo+8" 
                 alt="Spinning" 
                 class="photo-image">
        </div>
        
        <!-- 照片9 -->
        <div class="photo-item" onclick="openLightbox(9)">
            <img src="https://via.placeholder.com/400x300/FFD166/FFFFFF?text=Photo+9" 
                 alt="Audience" 
                 class="photo-image">
        </div>
        
        <!-- 照片10 -->
        <div class="photo-item" onclick="openLightbox(10)">
            <img src="https://via.placeholder.com/400x300/118AB2/FFFFFF?text=Photo+10" 
                 alt="Final Bow" 
                 class="photo-image">
        </div>
    </div>
    
    <!-- Lightbox 模态框 -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <button class="lightbox-nav lightbox-prev" onclick="changeImage(-1)">‹</button>
        <div class="lightbox-content">
            <img id="lightbox-img" class="lightbox-img" src="" alt="">
        </div>
        <button class="lightbox-nav lightbox-next" onclick="changeImage(1)">›</button>
    </div>
    
    <!-- 操作按钮 -->
    <div class="action-buttons">
        <a href="figure-skating.html" class="action-btn btn-outline">Back to Figure Skating</a>
        <a href="photos.html" class="action-btn btn-outline">All Photos</a>
    </div>
    
    <script>
        // Lightbox 功能
        let currentImageIndex = 1;
        const totalImages = 10; // 照片总数
        
        function openLightbox(index) {
            currentImageIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            
            // 获取被点击的图片
            const clickedImage = document.querySelector(`.photo-item:nth-child(${index}) .photo-image`);
            
            // 设置Lightbox内容
            lightboxImg.src = clickedImage.src;
            lightboxImg.alt = clickedImage.alt;
            
            // 显示Lightbox
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function changeImage(direction) {
            currentImageIndex += direction;
            
            // 循环浏览图片
            if (currentImageIndex < 1) currentImageIndex = totalImages;
            if (currentImageIndex > totalImages) currentImageIndex = 1;
            
            // 模拟点击新图片
            openLightbox(currentImageIndex);
        }
        
        // 键盘控制
        document.addEventListener('keydown', function(e) {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') changeImage(-1);
            if (e.key === 'ArrowRight') changeImage(1);
        });
        
        // 点击背景关闭
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
    <script src="footer.js"></script>
</body>
</html>
