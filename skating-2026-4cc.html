<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Four Continents - Figure Skating</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        body {
            background: #f8fafc;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 导航 */
        .breadcrumb {
            margin: 20px 0 30px;
            color: #666;
        }
        
        .breadcrumb a {
            color: #667eea;
            text-decoration: none;
        }
        
        /* 页面标题 */
        .album-header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            border-radius: 12px;
            color: #333;
            margin-bottom: 40px;
            border: 1px solid #e8edf5;
        }
        
        .album-header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .album-meta {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 15px;
            color: #555;
            flex-wrap: wrap;
            font-size: 1.1em;
        }
        
        .album-meta span {
            display: inline-block;
            padding: 0 15px;
            position: relative;
        }
        
        .album-meta span:not(:last-child)::after {
            content: "•";
            position: absolute;
            right: -18px;
            color: #aaa;
        }
        
        /* 照片网格 - 一行3张 */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 40px 0;
        }
        
        .photo-item {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 3px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #f0f0f0;
            cursor: pointer;
        }
        
        .photo-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        
        .photo-image {
            width: 100%; /* 确保宽度填满容器 */
            aspect-ratio: 4/3; /* 保持4:3的宽高比 */
            object-fit: cover; /* 核心：等比例缩放并裁剪，聚焦图片中心 */
            display: block; /* 确保正确显示 */
            transition: transform 0.3s; /* 保留原有的悬停放大效果 */
        }
        
        .photo-item:hover .photo-image {
            transform: scale(1.05);
        }
        
        /* Lightbox 模态框样式 */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }
        
        .lightbox-img {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }
        
        .lightbox-close:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.1);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        
        .lightbox-nav:hover {
            background: rgba(255,255,255,0.2);
        }
        
        .lightbox-prev {
            left: 20px;
        }
        
        .lightbox-next {
            right: 20px;
        }
        
        /* 操作按钮 */
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 40px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 1em;
        }
        
        .btn-outline {
            border: 1px solid #ddd;
            color: #666;
            background: white;
        }
        
        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
            background: #f8fafc;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .photo-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 900px) {
            .photo-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .lightbox-nav {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
        
        @media (max-width: 768px) {
            .photo-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .album-header h1 {
                font-size: 1.8em;
            }
            
            .album-meta {
                flex-direction: column;
                gap: 5px;
            }
            
            .album-meta span:not(:last-child)::after {
                display: none;
            }
        }
        
        @media (max-width: 480px) {
            .photo-grid {
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航 -->
    <div class="breadcrumb">
        <a href="index.html">Home</a> &gt;
        <a href="photos.html">Photos</a> &gt;
        <a href="figure-skating.html">Figure Skating</a> &gt;
        <span>2026 Four Continents</span>
    </div>
    
    <!-- 相册标题 - 已修改 -->
    <header class="album-header">
        <h1>2026 Four Continents Championships</h1>
        <div class="album-meta">
            <span>Beijing, China</span>
            <span>Jan 2026</span>
            <span>10 photos</span>
        </div>
    </header>
    
    <!-- 照片网格 - 完全无文字，包括占位符图片也不显示文字 -->
    <div class="photo-grid">
        <!-- 照片1 -->
        <div class="photo-item" onclick="openLightbox(1)">
            <img src="images/figure-skating/2026-4cc/photo1.jpg" class=""photo-image">
        </div>
        
        <!-- 照片2 -->
        <div class="photo-item" onclick="openLightbox(2)">
            <img src="images/figure-skating/2026-4cc/photo2.jpg" class=""photo-image">
        </div>
        
        <!-- 照片3 -->
        <div class="photo-item" onclick="openLightbox(3)">
            <img src="images/figure-skating/2026-4cc/photo3.jpg" class=""photo-image">
        </div>
        
        <!-- 照片4 -->
        <div class="photo-item" onclick="openLightbox(4)">
            <img src="images/figure-skating/2026-4cc/photo4.jpg" class=""photo-image">
        </div>
        <!-- 照片5 -->
        <div class="photo-item" onclick="openLightbox(5)">
            <img src="images/figure-skating/2026-4cc/photo5.jpg" class=""photo-image">
        </div>
        
        <!-- 照片6 -->
        <div class="photo-item" onclick="openLightbox(6)">
            <img src="images/figure-skating/2026-4cc/photo6.jpg" class=""photo-image">
        </div>
        
        <!-- 照片7 -->
        <div class="photo-item" onclick="openLightbox(7)">
            <img src="images/figure-skating/2026-4cc/photo7.jpg" class=""photo-image">
        </div>
        
        <!-- 照片8 -->
        <div class="photo-item" onclick="openLightbox(8)">
            <img src="images/figure-skating/2026-4cc/photo8.jpg" class=""photo-image">
        </div>
        
        <!-- 照片9 -->
        <div class="photo-item" onclick="openLightbox(9)">
            <img src="images/figure-skating/2026-4cc/photo9.jpg" class=""photo-image">
        </div>
        
        <!-- 照片10 -->
        <div class="photo-item" onclick="openLightbox(10)">
            <img src="images/figure-skating/2026-4cc/photo10.jpg" class=""photo-image">
        </div>
    </div>
    
    <!-- Lightbox 模态框 -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">×</button>
        <button class="lightbox-nav lightbox-prev" onclick="changeImage(-1)">‹</button>
        <div class="lightbox-content">
            <img id="lightbox-img" class="lightbox-img" src="">
        </div>
        <button class="lightbox-nav lightbox-next" onclick="changeImage(1)">›</button>
    </div>
    
    <!-- 操作按钮 -->
    <div class="action-buttons">
        <a href="figure-skating.html" class="action-btn btn-outline">Back to Figure Skating</a>
        <a href="photos.html" class="action-btn btn-outline">All Photos</a>
    </div>
    
    <!-- 页脚 -->
    <script src="footer.js"></script>
    
    <script>
        // Lightbox 功能
        let currentImageIndex = 1;
        const totalImages = 10;
        
        function openLightbox(index) {
            currentImageIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            
            // 获取被点击的图片
            const clickedImage = document.querySelector(`.photo-item:nth-child(${index}) .photo-image`);
            
            // 设置Lightbox内容
            lightboxImg.src = clickedImage.src;
            
            // 显示Lightbox
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function changeImage(direction) {
            currentImageIndex += direction;
            
            // 循环浏览图片
            if (currentImageIndex < 1) currentImageIndex = totalImages;
            if (currentImageIndex > totalImages) currentImageIndex = 1;
            
            // 模拟点击新图片
            openLightbox(currentImageIndex);
        }
        
        // 键盘控制
        document.addEventListener('keydown', function(e) {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;
            
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') changeImage(-1);
            if (e.key === 'ArrowRight') changeImage(1);
        });
        
        // 点击背景关闭
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
    </script>
</body>
</html>
