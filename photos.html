<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Photos</title>
    <style>
        body { 
            background: #fafafa; 
            padding: 40px 20px; 
            font-family: sans-serif;
            max-width: 900px;
            margin: 0 auto;
        }
        .home-link {
            text-decoration: none;
            color: #666;
            margin-bottom: 40px;
            display: inline-block;
            font-size: 18px;
        }
        .list {
            display: flex;
            flex-direction: column;
            gap: 15px;  /* 缩小间距 */
        }
        .item {
            background: white;
            padding: 30px 20px;  /* 缩小内边距 */
            border-radius: 8px;   /* 稍微圆角 */
            text-align: center;
            text-decoration: none;
            color: #333;
            border: 1px solid #eee;
            transition: all 0.2s ease;
        }
        .item:hover {
            border-color: #667eea;
            transform: translateX(5px);  /* 添加微移动效果 */
        }
        /* 调整图标和文字大小 */
        .item b {
            font-size: 18px;  /* 稍微小点 */
            display: block;
            margin-top: 10px;
        }
        .item::before {
            font-size: 32px;  /* 图标大小 */
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-link">←</a>
    
    <div class="list">
        <a href="#skating" class="item">⛸️<b>Figure Skating</b></a>
        <a href="#scenery" class="item">🏞️<b>Sceneries</b></a>
        <a href="#images" class="item">🧍🏻<b>Images</b></a>
    </div>
    <script src="footer.js"></script>
</body>
</html>
